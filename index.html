<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUSTAVO VIP V4 - HACKER MODE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 95%; max-width: 400px; background: rgba(0, 20, 0, 0.9); padding: 20px; border: 2px solid #0f0; box-shadow: 0 0 30px #0f0; border-radius: 5px; position: relative; }
        .danger-zone { background: #ff0000; color: #fff; font-size: 0.7rem; padding: 5px; margin-bottom: 15px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .console { background: #000; height: 180px; border: 1px solid #0f0; padding: 10px; font-size: 0.7rem; overflow-y: auto; margin-bottom: 15px; color: #0f0; }
        .btn-hacker { width: 100%; padding: 15px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; box-shadow: 0 0 10px #0f0; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #0f0; color: #0f0; margin-bottom: 10px; outline: none; text-align: center; }
        .stats { font-size: 0.6rem; text-align: left; margin-bottom: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <div class="danger-zone">⚠️ AVISO: RISCO DE BANIMENTO ALTO - USE COM CAUTELA</div>
        <h2 style="text-align: center; margin-bottom: 10px;">GUSTAVO VIP V4 ⚔️</h2>
        
        <div class="stats" id="stats">
            ID: GUSTAVO_BYPASS_OFFLINE<br>
            LOCAL_HOST: 127.0.0.1<br>
            AIM_LOCK: DISCONNECTED
        </div>

        <div class="console" id="console">> Iniciando sistema de injeção...</div>

        <button class="btn-hacker" onclick="injetarHacker()">ATIVAR AIM LOCK (CABEÇA)</button>

        <hr style="border: 0.5px solid #0f0; margin: 15px 0;">

        <input type="text" id="dev" placeholder="MODELO DO DISPOSITIVO">
        <button class="btn-hacker" style="background: #111; color: #0f0; border: 1px solid #0f0;" onclick="configHacker()">GERAR SENSI HACKER</button>
    </div>

    <script>
        const log = document.getElementById('console');
        function writeLog(text, color = "#0f0") {
            log.innerHTML += `<br><span style="color:${color}">> ${text}</span>`;
            log.scrollTop = log.scrollHeight;
        }

        function injetarHacker() {
            writeLog("Bypassing Anticheat...", "red");
            setTimeout(() => writeLog("Localizando coordenadas da cabeça...", "white"), 800);
            setTimeout(() => writeLog("Injetando script 'Magnetic_Aim_V4'...", "white"), 1500);
            setTimeout(() => {
                writeLog("AIM LOCK ATIVADO COM SUCESSO!", "#0f0");
                document.getElementById('stats').innerHTML = "ID: GUSTAVO_BYPASS_ACTIVE<br>LOCAL_HOST: 127.0.0.1<br>AIM_LOCK: CONNECTED (HEAD)";
                alert("AIM LOCK ATIVADO! A mira pulará direto para a cabeça ao atirar.");
            }, 2500);
        }

        function configHacker() {
            const dev = document.getElementById('dev').value;
            if(!dev) return alert("Insira o modelo!");
            writeLog(`Otimizando sensibilidade para ${dev}...`, "yellow");
            setTimeout(() => {
                alert(`🎯 SENSI HACKER PARA ${dev.toUpperCase()}\n\nDPI: 960\nGeral: 100\nRed Dot: 100\nMira 2x: 100\nMira 4x: 100\nBotão de Atirar: 35%`);
            }, 1000);
        }
    </script>
</body>
</html>
