<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUSTAVO VIP - Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: #00ff41; font-family: sans-serif; overflow: hidden; }
        
        /* Estilo da Notificação Nativa Fake */
        #push-notif {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
        }
        #push-notif.show { top: 20px; }
        .notif-icon { width: 40px; height: 40px; background: #00ff41; border-radius: 10px; margin-right: 12px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .notif-text b { display: block; font-size: 0.9rem; color: #fff; }
        .notif-text span { font-size: 0.8rem; color: #aaa; }

        /* Resto do App */
        .container { width: 95%; max-width: 400px; background: #121212; padding: 25px; border-radius: 20px; border: 2px solid #00ff41; margin: 20px auto; text-align: center; }
        .btn { width: 100%; padding: 15px; background: #00ff41; color: #000; border: none; border-radius: 10px; font-weight: bold; margin: 10px 0; cursor: pointer; }
        .console { background: #000; height: 100px; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 0.7rem; overflow-y: auto; text-align: left; margin: 15px 0; border: 1px solid #222; }
        input, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="push-notif">
        <div class="notif-icon">G</div>
        <div class="notif-text">
            <b>GUSTAVO VIP 💎</b>
            <span>Otimização Concluída: 100% Performance</span>
        </div>
    </div>

    <div class="container">
        <h1>GUSTAVO VIP 💎</h1>
        <div id="status" style="font-size: 0.8rem; margin-bottom: 10px;">SISTEMA: PRONTO</div>
        <div class="console" id="console">> Aguardando...</div>
        <button class="btn" onclick="iniciarOtimizacao()">OTIMIZAR AGORA</button>
        <hr style="border: 0.5px solid #222; margin: 20px 0;">
        <input type="text" id="modelo" placeholder="Modelo do Celular">
        <select id="estilo">
            <option value="desert">Desert / One Tap</option>
            <option value="smg">SMG / Rush</option>
        </select>
        <button class="btn" style="background: #333; color: #fff;" onclick="gerarSensi()">GERAR SENSI</button>
    </div>

    <script>
        function tocarSom() {
            const context = new AudioContext();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain); gain.connect(context.destination);
            osc.frequency.value = 800; gain.gain.value = 0.1;
            osc.start(); osc.stop(context.currentTime + 0.1);
        }

        function mostrarNotificacao() {
            const notif = document.getElementById('push-notif');
            notif.classList.add('show');
            tocarSom();
            setTimeout(() => { notif.classList.remove('show'); }, 4000);
        }

        function iniciarOtimizacao() {
            const consoleBox = document.getElementById('console');
            consoleBox.innerHTML += "<br>> Limpando RAM...";
            setTimeout(() => {
                consoleBox.innerHTML += "<br>> Performance Ativa!";
                mostrarNotificacao();
            }, 2000);
        }

        function gerarSensi() {
            const mod = document.getElementById('modelo').value;
            if(!mod) return alert("Digite o modelo!");
            alert("SENSI GERADA PARA " + mod.toUpperCase() + "\nDPI: " + (600 + Math.floor(Math.random()*50)));
        }
    </script>
</body>
</html>
