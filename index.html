<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUSTAVO VIP - Otimizador Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 95%;
            max-width: 400px;
            background: #121212;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; text-shadow: 0 0 10px #00ff41; }
        .status-badge {
            background: #1a1a1a;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            border: 1px solid #333;
            margin-bottom: 20px;
            display: inline-block;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #00ff41;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin: 10px 0;
        }
        .btn:active { transform: scale(0.95); background: #00cc33; }
        .btn-secondary { background: #333; color: #fff; }
        
        .console {
            background: #000;
            height: 110px;
            border-radius: 10px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            overflow-y: auto;
            text-align: left;
            border: 1px solid #222;
            margin: 15px 0;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 10px;
            outline: none;
        }
        input:focus, select:focus { border-color: #00ff41; }
        label { font-size: 0.8rem; display: block; text-align: left; margin-bottom: 5px; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GUSTAVO VIP 💎</h1>
        <div class="status-badge" id="status">SISTEMA: PRONTO</div>

        <div class="console" id="console">
            > Aguardando comando...<br>
            > Versão 2.1 Online.
        </div>

        <button class="btn" onclick="iniciarOtimizacao()">OTIMIZAR AGORA</button>

        <hr style="border: 0.5px solid #222; margin: 20px 0;">

        <h3>GERADOR DE SENSI VIP</h3>
        <label>Modelo do Celular:</label>
        <input type="text" id="modelo" placeholder="Ex: Xiaomi Poco X3">
        
        <label>Estilo de Jogo:</label>
        <select id="estilo">
            <option value="desert">Focado em Desert / Sniper</option>
            <option value="smg">Focado em SMG / Rush</option>
        </select>
        
        <button class="btn btn-secondary" onclick="gerarSensi()">GERAR CONFIGURAÇÃO</button>
    </div>

    <script>
        const consoleBox = document.getElementById('console');
        const statusBadge = document.getElementById('status');

        function addLog(texto, cor = "#00ff41") {
            const span = document.createElement('span');
            span.style.color = cor;
            span.innerHTML = `<br>> ${texto}`;
            consoleBox.appendChild(span);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function iniciarOtimizacao() {
            statusBadge.innerText = "STATUS: OTIMIZANDO...";
            statusBadge.style.color = "yellow";
            statusBadge.style.borderColor = "yellow";

            const etapas = [
                "Limpando cache de aplicativos...",
                "Otimizando núcleos do processador...",
                "Ajustando latência de rede...",
                "Liberando Memória RAM...",
                "Finalizado! Performance aumentada."
            ];

            etapas.forEach((msg, index) => {
                setTimeout(() => {
                    addLog(msg);
                    if (index === etapas.length - 1) {
                        statusBadge.innerText = "STATUS: OTIMIZADO";
                        statusBadge.style.color = "#00ff41";
                        statusBadge.style.borderColor = "#00ff41";
                    }
                }, (index + 1) * 800);
            });
        }

        function gerarSensi() {
            const modelo = document.getElementById('modelo').value;
            const estilo = document.getElementById('estilo').value;

            if (!modelo) {
                alert("Por favor, digite o modelo do celular.");
                return;
            }

            addLog(`Analisando hardware de: ${modelo}...`, "cyan");
            
            // Lógica dinâmica para variar os números
            let baseDpi = 500 + (modelo.length * 7);
            if (estilo === "smg") baseDpi += 40;
            
            const dpiFinal = baseDpi + Math.floor(Math.random() * 15);
            const geral = 94 + Math.floor(Math.random() * 6);
            const redDot = 88 + Math.floor(Math.random() * 10);

            setTimeout(() => {
                alert(`CONFIG VIP PARA ${modelo.toUpperCase()}\n\n` +
                      `DPI: ${dpiFinal}\n` +
                      `Geral: ${geral}\n` +
                      `Red Dot: ${redDot}\n` +
                      `Mira 2x: 95\n` +
                      `Mira 4x: 100\n\n` +
                      `Modo: ${estilo.toUpperCase()}`);
            }, 1200);
        }
    </script>
</body>
</html>
