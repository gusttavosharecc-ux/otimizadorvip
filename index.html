<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; font-family: sans-serif; }
        .mod-menu {
            width: 200px; background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0f0; border-radius: 10px;
            color: #0f0; padding: 10px; position: fixed;
            top: 20%; left: 10px; z-index: 9999;
            box-shadow: 0 0 15px #0f0;
        }
        .header { text-align: center; border-bottom: 1px solid #0f0; margin-bottom: 10px; font-size: 12px; }
        .option { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 10px; }
        .switch { width: 30px; height: 15px; background: #333; border-radius: 10px; position: relative; cursor: pointer; }
        .active { background: #0f0; }
        .status { font-size: 8px; color: #fff; margin-top: 10px; border-top: 1px solid #333; padding-top: 5px; }
    </style>
</head>
<body>

<div class="mod-menu">
    <div class="header">GUSTAVO MOD V5 ⚔️</div>
    
    <div class="option">
        <span>AIMBOT HEAD</span>
        <div class="switch" onclick="this.classList.toggle('active'); toggle('aim')"></div>
    </div>
    
    <div class="option">
        <span>AUTO-RECOIL</span>
        <div class="switch" onclick="this.classList.toggle('active'); toggle('rec')"></div>
    </div>

    <div class="option">
        <span>SPEED TOUCH</span>
        <div class="switch" onclick="this.classList.toggle('active'); toggle('speed')"></div>
    </div>

    <div class="status" id="log">> SYSTEM: READY...</div>
</div>

<script>
    function toggle(type) {
        const log = document.getElementById('log');
        if(type === 'aim') log.innerHTML = "> AIMLOCK: ON (HEAD)";
        if(type === 'rec') log.innerHTML = "> NO-RECOIL: 100%";
        if(type === 'speed') log.innerHTML = "> TOUCH: BYPASS ACTIVE";
    }
</script>

</body>
</html>
